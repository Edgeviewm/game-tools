<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dungeonborne 伤害计算器 - Exact Formula</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="alternate" href="https://gametoolsfun.com/en/dungeonborne-calculator/index.html" hreflang="en" />
  <link rel="alternate" href="https://gametoolsfun.com/zh/dungeonborne-calculator/index.html" hreflang="zh" />
  <link rel="alternate" href="https://gametoolsfun.com/ja/dungeonborne-calculator/index.html" hreflang="ja" />
  <link rel="alternate" href="https://gametoolsfun.com/es/dungeonborne-calculator/index.html" hreflang="es" />
  <link rel="alternate" href="https://gametoolsfun.com/en/dungeonborne-calculator/index.html" hreflang="x-default" />
</head>
<body class="min-h-screen bg-slate-950 text-slate-100">
  <div class="language-switcher flex flex-wrap justify-end gap-2 px-5 pt-3"><a href="/en/dungeonborne-calculator/" class="rounded-full border border-amber-400 px-3 py-2 text-sm font-semibold transition bg-slate-950 text-slate-100 hover:bg-slate-800 hover:text-amber-300">English</a><a href="/zh/dungeonborne-calculator/" class="rounded-full border border-amber-400 px-3 py-2 text-sm font-semibold transition bg-amber-400 text-slate-950">中文</a><a href="/ja/dungeonborne-calculator/" class="rounded-full border border-amber-400 px-3 py-2 text-sm font-semibold transition bg-slate-950 text-slate-100 hover:bg-slate-800 hover:text-amber-300">日本語</a><a href="/es/dungeonborne-calculator/" class="rounded-full border border-amber-400 px-3 py-2 text-sm font-semibold transition bg-slate-950 text-slate-100 hover:bg-slate-800 hover:text-amber-300">Español</a></div>

  <!-- 以下是你原来的计算器内容，保持不变 -->
  <main class="min-h-screen px-4 py-8 sm:px-6 lg:px-8">
    <section class="mx-auto w-full max-w-6xl overflow-hidden rounded-3xl border border-amber-400/20 bg-slate-900/90 shadow-2xl shadow-amber-950/30">
      <header class="bg-gradient-to-br from-amber-500/20 via-red-950/40 to-slate-950 px-6 py-8 text-center sm:px-8 md:px-12 md:py-10">
        <p class="mb-3 text-xs font-bold uppercase tracking-[0.35em] text-amber-300 sm:text-sm">精确公式战斗工具</p>
        <h1 class="text-3xl font-black tracking-tight text-white sm:text-4xl md:text-5xl">Dungeonborne 伤害计算器</h1>
        <p class="mx-auto mt-4 max-w-3xl text-sm leading-6 text-slate-300 sm:text-base">
          输入武器、属性、技能、暴击和防御数值，计算最终伤害并查看详细步骤。
        </p>
      </header>

      <div class="grid gap-6 px-6 py-7 sm:px-8 md:px-10 lg:grid-cols-[1.05fr_0.95fr]">
        <!-- 输入区域 -->
        <section class="rounded-3xl border border-slate-800 bg-slate-950/50 p-5 sm:p-6">
          <h2 class="mb-5 text-xl font-bold text-white">输入参数</h2>
          <div class="grid gap-5 sm:grid-cols-2">
            <label class="block"><span class="mb-2 block text-sm font-semibold text-slate-200">武器基础伤害</span><input id="weaponBaseDamage" type="number" value="100" min="0" class="w-full rounded-2xl border border-slate-700 bg-slate-900 px-4 py-3 text-white outline-none"></label>
            <label class="block"><span class="mb-2 block text-sm font-semibold text-slate-200">攻击类型</span><select id="attackType" class="w-full rounded-2xl border border-slate-700 bg-slate-900 px-4 py-3 text-white"><option value="physical">物理（力量）</option><option value="magical">魔法（智力/意志）</option></select></label>
            <label class="block"><span id="attributeLabel" class="mb-2 block text-sm font-semibold text-slate-200">力量/智力/意志值</span><input id="attributeValue" type="number" value="50" min="0" class="w-full rounded-2xl border border-slate-700 bg-slate-900 px-4 py-3 text-white"></label>
            <label class="block"><span class="mb-2 block text-sm font-semibold text-slate-200">技能成长率（%）</span><input id="skillGrowthRate" type="number" value="50" step="0.1" class="w-full rounded-2xl border border-slate-700 bg-slate-900 px-4 py-3 text-white"></label>
            <label class="block"><span class="mb-2 block text-sm font-semibold text-slate-200">击杀加成（%）</span><input id="killBonus" type="number" value="0" step="0.1" class="w-full rounded-2xl border border-slate-700 bg-slate-900 px-4 py-3 text-white"></label>
            <label class="block"><span class="mb-2 block text-sm font-semibold text-slate-200">伤害增益（%）</span><input id="damageBuff" type="number" value="0" step="0.1" class="w-full rounded-2xl border border-slate-700 bg-slate-900 px-4 py-3 text-white"></label>
            <label class="flex items-center gap-3 rounded-2xl border border-slate-700 bg-slate-900 px-4 py-3"><input id="criticalHit" type="checkbox" class="h-5 w-5"><span class="text-sm font-semibold text-slate-200">是否暴击？</span></label>
            <label class="block"><span class="mb-2 block text-sm font-semibold text-slate-200">暴击倍率</span><input id="criticalMultiplier" type="number" value="1.5" step="0.1" class="w-full rounded-2xl border border-slate-700 bg-slate-900 px-4 py-3 text-white"></label>
            <label class="block"><span class="mb-2 block text-sm font-semibold text-slate-200">敌人防御等级</span><input id="enemyDefenseLevel" type="number" value="0" min="0" max="50" class="w-full rounded-2xl border border-slate-700 bg-slate-900 px-4 py-3 text-white"></label>
            <label class="block"><span class="mb-2 block text-sm font-semibold text-slate-200">攻击等级</span><input id="attackLevel" type="number" value="0" min="0" max="50" class="w-full rounded-2xl border border-slate-700 bg-slate-900 px-4 py-3 text-white"></label>
            <label class="block sm:col-span-2"><span class="mb-2 block text-sm font-semibold text-slate-200">身体部位</span><select id="bodyPart" class="w-full rounded-2xl border border-slate-700 bg-slate-900 px-4 py-3 text-white"><option value="normal">普通</option><option value="headshot">爆头</option><option value="other">其他</option></select></label>
          </div>
          <button id="calculateButton" type="button" class="mt-6 w-full rounded-2xl bg-gradient-to-r from-amber-500 to-red-600 px-5 py-4 text-base font-extrabold text-white">计算伤害</button>
        </section>

        <!-- 结果区域 -->
        <section class="rounded-3xl border border-amber-500/20 bg-slate-950/70 p-5 sm:p-6">
          <h2 class="mb-5 text-xl font-bold text-white">结果</h2>
          <div class="rounded-3xl border border-amber-400/30 bg-gradient-to-br from-amber-500/15 to-red-600/10 px-5 py-6 text-center">
            <p class="text-sm font-semibold uppercase tracking-[0.25em] text-amber-300">最终伤害</p>
            <p id="finalDamage" class="mt-3 text-5xl font-black text-white sm:text-6xl">100</p>
          </div>
          <div class="mt-6"><h3 class="mb-3 text-lg font-bold text-white">详细计算步骤</h3><div id="calculationSteps" class="space-y-3 text-sm leading-6 text-slate-300"></div></div>
        </section>
      </div>
      <footer class="border-t border-slate-800 bg-slate-950/60 px-6 py-6 text-sm leading-7 text-slate-400"><p>说明：本计算器暂时使用属性公式：属性加成 = 属性值 × 2。</p></footer>
    </section>
  </main>

  <script>
    const ATTRIBUTE_BONUS_MULTIPLIER = 2;
    const fields = {
      weaponBaseDamage: document.getElementById('weaponBaseDamage'),
      attackType: document.getElementById('attackType'),
      attributeValue: document.getElementById('attributeValue'),
      skillGrowthRate: document.getElementById('skillGrowthRate'),
      killBonus: document.getElementById('killBonus'),
      damageBuff: document.getElementById('damageBuff'),
      criticalHit: document.getElementById('criticalHit'),
      criticalMultiplier: document.getElementById('criticalMultiplier'),
      enemyDefenseLevel: document.getElementById('enemyDefenseLevel'),
      attackLevel: document.getElementById('attackLevel'),
      bodyPart: document.getElementById('bodyPart')
    };
    const attributeLabel = document.getElementById('attributeLabel');
    const calculateButton = document.getElementById('calculateButton');
    const finalDamageElement = document.getElementById('finalDamage');
    const calculationStepsElement = document.getElementById('calculationSteps');

    function getNumber(input, fallback = 0) { let v = Number(input.value); return isFinite(v) ? v : fallback; }
    function clamp(v, min, max) { return Math.min(Math.max(v, min), max); }
    function floorDamage(v) { return Math.floor(Math.max(v, 0)); }
    function formatNumber(v) { return Number.isInteger(v) ? String(v) : v.toFixed(2); }

    function updateFieldStates() {
      const isHeadshot = fields.bodyPart.value === 'headshot';
      const isCritical = fields.criticalHit.checked || isHeadshot;
      fields.criticalHit.checked = isCritical;
      fields.criticalHit.disabled = isHeadshot;
      fields.criticalMultiplier.disabled = !isCritical;
      attributeLabel.textContent = fields.attackType.value === 'physical' ? '力量值' : '智力/意志值';
    }

    function calculateDamage() {
      updateFieldStates();
      const weaponBaseDamage = getNumber(fields.weaponBaseDamage);
      const attributeValue = getNumber(fields.attributeValue);
      const skillGrowthRate = getNumber(fields.skillGrowthRate);
      const killBonus = getNumber(fields.killBonus);
      const damageBuff = getNumber(fields.damageBuff);
      const baseCriticalMultiplier = getNumber(fields.criticalMultiplier, 1.5);
      const enemyDefenseLevel = clamp(getNumber(fields.enemyDefenseLevel), 0, 50);
      const attackLevel = clamp(getNumber(fields.attackLevel), 0, 50);
      const isHeadshot = fields.bodyPart.value === 'headshot';
      const isCritical = fields.criticalHit.checked || isHeadshot;
      fields.enemyDefenseLevel.value = enemyDefenseLevel;
      fields.attackLevel.value = attackLevel;
      const attributeBonus = attributeValue * ATTRIBUTE_BONUS_MULTIPLIER;
      const baseDamage = weaponBaseDamage + attributeBonus;
      const skillGrowthDamage = baseDamage * (skillGrowthRate / 100);
      const multiplierDamage = skillGrowthDamage * (1 + killBonus / 100) * (1 + damageBuff / 100);
      const finalCriticalMultiplier = isCritical ? baseCriticalMultiplier + (isHeadshot ? 0.5 : 0) : 1;
      const afterCritical = multiplierDamage * finalCriticalMultiplier;
      const effectiveDefenseLevel = Math.max(enemyDefenseLevel - attackLevel, 0);
      const defenseReduction = Math.max(0, 1 - effectiveDefenseLevel * 0.02);
      const finalDamage = afterCritical * defenseReduction;
      finalDamageElement.textContent = floorDamage(finalDamage);
      calculationStepsElement.innerHTML = `
        <div class="rounded-2xl border border-slate-800 bg-slate-900/80 p-4"><span class="font-bold text-amber-200">1. 属性加成：</span> ${attributeValue} × ${ATTRIBUTE_BONUS_MULTIPLIER} = ${floorDamage(attributeBonus)}</div>
        <div class="rounded-2xl border border-slate-800 bg-slate-900/80 p-4"><span class="font-bold text-amber-200">2. 基础伤害：</span> ${weaponBaseDamage} + ${floorDamage(attributeBonus)} = ${floorDamage(baseDamage)}</div>
        <div class="rounded-2xl border border-slate-800 bg-slate-900/80 p-4"><span class="font-bold text-amber-200">3. 技能成长伤害：</span> ${floorDamage(baseDamage)} × (${skillGrowthRate} / 100) = ${floorDamage(skillGrowthDamage)}</div>
        <div class="rounded-2xl border border-slate-800 bg-slate-900/80 p-4"><span class="font-bold text-amber-200">4. 乘法修饰伤害：</span> ${floorDamage(skillGrowthDamage)} × (1 + ${killBonus} / 100) × (1 + ${damageBuff} / 100) = ${floorDamage(multiplierDamage)}</div>
        <div class="rounded-2xl border border-slate-800 bg-slate-900/80 p-4"><span class="font-bold text-amber-200">5. 暴击后伤害：</span> ${floorDamage(multiplierDamage)} × ${formatNumber(finalCriticalMultiplier)}${isHeadshot ? ' （爆头：暴击倍率 +0.5）' : ''} = ${floorDamage(afterCritical)}</div>
        <div class="rounded-2xl border border-slate-800 bg-slate-900/80 p-4"><span class="font-bold text-amber-200">6. 有效防御等级：</span> max(${enemyDefenseLevel} - ${attackLevel}, 0) = ${effectiveDefenseLevel}</div>
        <div class="rounded-2xl border border-slate-800 bg-slate-900/80 p-4"><span class="font-bold text-amber-200">7. 防御减免：</span> max(0, 1 - ${effectiveDefenseLevel} × 0.02) = ${formatNumber(defenseReduction)}</div>
        <div class="rounded-2xl border border-amber-500/30 bg-amber-500/10 p-4 text-amber-100"><span class="font-bold">8. 最终伤害:</span> ${floorDamage(afterCritical)} × ${formatNumber(defenseReduction)} = ${floorDamage(finalDamage)}</div>
      `;
    }
    calculateButton.addEventListener('click', calculateDamage);
    Object.values(fields).forEach(f => { f.addEventListener('input', updateFieldStates); f.addEventListener('change', updateFieldStates); });
    updateFieldStates();
    calculateDamage();
  </script>
</body>
</html>
