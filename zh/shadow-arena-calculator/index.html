<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shadow Arena 伤害计算器</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="alternate" href="https://gametoolsfun.com/en/shadow-arena-calculator/index.html" hreflang="en" />
  <link rel="alternate" href="https://gametoolsfun.com/zh/shadow-arena-calculator/index.html" hreflang="zh" />
  <link rel="alternate" href="https://gametoolsfun.com/ja/shadow-arena-calculator/index.html" hreflang="ja" />
  <link rel="alternate" href="https://gametoolsfun.com/es/shadow-arena-calculator/index.html" hreflang="es" />
  <link rel="alternate" href="https://gametoolsfun.com/en/shadow-arena-calculator/index.html" hreflang="x-default" />
</head>
<body class="bg-slate-950 text-slate-100">
  <div class="language-switcher flex flex-wrap justify-end gap-2 px-5 pt-3"><a href="/en/shadow-arena-calculator/" class="rounded-full border border-amber-400 px-3 py-2 text-sm font-semibold transition bg-slate-950 text-slate-100 hover:bg-slate-800 hover:text-amber-300">English</a><a href="/zh/shadow-arena-calculator/" class="rounded-full border border-amber-400 px-3 py-2 text-sm font-semibold transition bg-amber-400 text-slate-950">中文</a><a href="/ja/shadow-arena-calculator/" class="rounded-full border border-amber-400 px-3 py-2 text-sm font-semibold transition bg-slate-950 text-slate-100 hover:bg-slate-800 hover:text-amber-300">日本語</a><a href="/es/shadow-arena-calculator/" class="rounded-full border border-amber-400 px-3 py-2 text-sm font-semibold transition bg-slate-950 text-slate-100 hover:bg-slate-800 hover:text-amber-300">Español</a></div>
  <div class="max-w-2xl mx-auto p-6 mt-10">
    <h1 class="text-3xl font-bold text-center mb-6">⚔️ Shadow Arena 伤害计算器</h1>
    <div class="bg-slate-900 p-6 rounded-2xl border border-amber-400/20">
      <label class="block mb-4">Attack Power: <input id="attack" type="number" value="100" class="w-full p-2 rounded bg-slate-800 border border-slate-700"></label>
      <label class="block mb-4">Defense: <input id="defense" type="number" value="50" class="w-full p-2 rounded bg-slate-800 border border-slate-700"></label>
      <button id="calcBtn" class="bg-amber-500 text-black px-4 py-2 rounded-full w-full font-bold">计算伤害</button>
      <p id="result" class="mt-6 text-2xl text-center text-amber-300">最终伤害: 0</p>
    </div>
  </div>
  <script>
    function calc() {
      let attack = Number(document.getElementById('attack').value) || 0;
      let defense = Number(document.getElementById('defense').value) || 0;
      let damage = Math.max(attack - defense, 0);
      document.getElementById('result').innerText = `最终伤害: ${damage}`;
    }
    document.getElementById('calcBtn').addEventListener('click', calc);
    calc();
  </script>
</body>
</html>
