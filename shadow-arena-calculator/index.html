<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shadow Arena Damage Calculator</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    window.gtranslateSettings = {
      "default_language": "en",
      "languages": ["en", "zh-CN", "zh-TW", "ja", "ko", "es", "fr", "de", "ar", "ru", "pt", "it", "hi", "tr", "vi", "th", "pl", "uk"],
      "wrapper_selector": ".gtranslate_wrapper",
      "switcher_horizontal_position": "right",
      "alt_flags": { "en": "usa", "zh-CN": "china" }
    };
  </script>
  <script src="https://cdn.gtranslate.net/widgets/latest/dwf.js" defer></script>
  <style>
    .gtranslate_wrapper { text-align: right; padding: 12px 20px 0 0; min-height: 50px; }
    .gtranslate_wrapper .gt_selector {
      background-color: #0f172a !important; color: #f1f5f9 !important;
      border: 1px solid #f59e0b !important; border-radius: 2rem !important;
      padding: 0.5rem 1rem !important; font-size: 0.875rem !important;
      cursor: pointer !important;
    }
    body { top: 0 !important; }
  </style>
</head>
<body class="bg-slate-950 text-slate-100">
  <div class="gtranslate_wrapper"></div>
  <div class="max-w-2xl mx-auto p-6 mt-10">
    <h1 class="text-3xl font-bold text-center mb-6">⚔️ Shadow Arena Damage Calculator</h1>
    <div class="bg-slate-900 p-6 rounded-2xl border border-amber-400/20">
      <label class="block mb-4">Attack Power: <input id="attack" type="number" value="100" class="w-full p-2 rounded bg-slate-800 border border-slate-700"></label>
      <label class="block mb-4">Defense: <input id="defense" type="number" value="50" class="w-full p-2 rounded bg-slate-800 border border-slate-700"></label>
      <button id="calcBtn" class="bg-amber-500 text-black px-4 py-2 rounded-full w-full font-bold">Calculate Damage</button>
      <p id="result" class="mt-6 text-2xl text-center text-amber-300">Final Damage: 0</p>
    </div>
  </div>
  <script>
    function calc() {
      let attack = Number(document.getElementById('attack').value) || 0;
      let defense = Number(document.getElementById('defense').value) || 0;
      let damage = Math.max(attack - defense, 0);
      document.getElementById('result').innerText = `Final Damage: ${damage}`;
    }
    document.getElementById('calcBtn').addEventListener('click', calc);
    calc();
  </script>
</body>
</html>
