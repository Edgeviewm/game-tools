<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Redirecting - Game Tools Hub</title>
</head>
<body>
  <script>
    (function() {
      var lang = navigator.language || navigator.userLanguage || 'en';
      if (lang.startsWith('zh')) window.location.href = '/zh/';
      else if (lang.startsWith('ja')) window.location.href = '/ja/';
      else if (lang.startsWith('es')) window.location.href = '/es/';
      else window.location.href = '/en/';
    })();
  </script>
  <noscript><meta http-equiv="refresh" content="0; url=/en/"></noscript>
</body>
</html>
