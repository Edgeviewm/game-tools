<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>地牢之子伤害计算器 - 精确公式</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-slate-950 text-slate-100">
  <main class="min-h-screen px-4 py-8 sm:px-6 lg:px-8">
    <section class="mx-auto w-full max-w-6xl overflow-hidden rounded-3xl border border-amber-400/20 bg-slate-900/90 shadow-2xl shadow-amber-950/30">
      <header class="bg-gradient-to-br from-amber-500/20 via-red-950/40 to-slate-950 px-6 py-8 text-center sm:px-8 md:px-12 md:py-10">
        <p class="mb-3 text-xs font-bold uppercase tracking-[0.35em] text-amber-300 sm:text-sm">Dungeonborne Combat Calculator</p>
        <h1 class="text-3xl font-black tracking-tight text-white sm:text-4xl md:text-5xl">地牢之子伤害计算器</h1>
        <p class="mx-auto mt-4 max-w-3xl text-sm leading-6 text-slate-300 sm:text-base">
          输入武器、属性、技能、暴击与防御等级，按照完整公式估算最终伤害，并查看每一步计算过程。
        </p>
      </header>

      <div class="grid gap-6 px-6 py-7 sm:px-8 md:px-10 lg:grid-cols-[1.05fr_0.95fr]">
        <section class="rounded-3xl border border-slate-800 bg-slate-950/50 p-5 sm:p-6">
          <h2 class="mb-5 text-xl font-bold text-white">输入参数</h2>

          <div class="grid gap-5 sm:grid-cols-2">
            <label class="block sm:col-span-1">
              <span class="mb-2 block text-sm font-semibold text-slate-200">武器基础伤害</span>
              <input id="weaponDamage" type="number" value="100" min="0" class="w-full rounded-2xl border border-slate-700 bg-slate-900 px-4 py-3 text-white outline-none transition focus:border-amber-400 focus:ring-4 focus:ring-amber-500/20">
            </label>

            <label class="block sm:col-span-1">
              <span class="mb-2 block text-sm font-semibold text-slate-200">攻击类型</span>
              <select id="attackType" class="w-full rounded-2xl border border-slate-700 bg-slate-900 px-4 py-3 text-white outline-none transition focus:border-amber-400 focus:ring-4 focus:ring-amber-500/20">
                <option value="physical">物理（力量）</option>
                <option value="magic">魔法（智力/意志）</option>
              </select>
            </label>

            <label class="block sm:col-span-1">
              <span id="attributeLabel" class="mb-2 block text-sm font-semibold text-slate-200">力量/智力值</span>
              <input id="attributeValue" type="number" value="50" min="0" class="w-full rounded-2xl border border-slate-700 bg-slate-900 px-4 py-3 text-white outline-none transition focus:border-amber-400 focus:ring-4 focus:ring-amber-500/20">
            </label>

            <label class="block sm:col-span-1">
              <span class="mb-2 block text-sm font-semibold text-slate-200">技能成长率 %</span>
              <input id="skillScaling" type="number" value="50" min="0" step="0.1" class="w-full rounded-2xl border border-slate-700 bg-slate-900 px-4 py-3 text-white outline-none transition focus:border-amber-400 focus:ring-4 focus:ring-amber-500/20">
            </label>

            <label class="block sm:col-span-1">
              <span class="mb-2 block text-sm font-semibold text-slate-200">击杀加成 %</span>
              <input id="killBonus" type="number" value="0" min="0" step="0.1" class="w-full rounded-2xl border border-slate-700 bg-slate-900 px-4 py-3 text-white outline-none transition focus:border-amber-400 focus:ring-4 focus:ring-amber-500/20">
            </label>

            <label class="block sm:col-span-1">
              <span class="mb-2 block text-sm font-semibold text-slate-200">伤害增益 %</span>
              <input id="damageBonus" type="number" value="0" min="0" step="0.1" class="w-full rounded-2xl border border-slate-700 bg-slate-900 px-4 py-3 text-white outline-none transition focus:border-amber-400 focus:ring-4 focus:ring-amber-500/20">
            </label>

            <label class="flex items-center gap-3 rounded-2xl border border-slate-700 bg-slate-900 px-4 py-3 sm:col-span-1">
              <input id="isCritical" type="checkbox" class="h-5 w-5 rounded border-slate-600 bg-slate-950 text-amber-500 focus:ring-amber-500/30">
              <span class="text-sm font-semibold text-slate-200">是否暴击</span>
            </label>

            <label class="block sm:col-span-1">
              <span class="mb-2 block text-sm font-semibold text-slate-200">暴击倍率</span>
              <input id="criticalMultiplier" type="number" value="1.5" min="1" step="0.1" class="w-full rounded-2xl border border-slate-700 bg-slate-900 px-4 py-3 text-white outline-none transition focus:border-amber-400 focus:ring-4 focus:ring-amber-500/20 disabled:cursor-not-allowed disabled:opacity-50">
            </label>

            <label class="block sm:col-span-1">
              <span class="mb-2 block text-sm font-semibold text-slate-200">敌人防御等级</span>
              <input id="enemyDefenseLevel" type="number" value="0" min="0" max="50" class="w-full rounded-2xl border border-slate-700 bg-slate-900 px-4 py-3 text-white outline-none transition focus:border-amber-400 focus:ring-4 focus:ring-amber-500/20">
            </label>

            <label class="block sm:col-span-1">
              <span class="mb-2 block text-sm font-semibold text-slate-200">攻击等级</span>
              <input id="attackLevel" type="number" value="0" min="0" max="50" class="w-full rounded-2xl border border-slate-700 bg-slate-900 px-4 py-3 text-white outline-none transition focus:border-amber-400 focus:ring-4 focus:ring-amber-500/20">
            </label>

            <label class="block sm:col-span-2">
              <span class="mb-2 block text-sm font-semibold text-slate-200">身体部位</span>
              <select id="bodyPart" class="w-full rounded-2xl border border-slate-700 bg-slate-900 px-4 py-3 text-white outline-none transition focus:border-amber-400 focus:ring-4 focus:ring-amber-500/20">
                <option value="normal">普通</option>
                <option value="headshot">爆头</option>
                <option value="other">其他</option>
              </select>
            </label>
          </div>

          <button id="calculateButton" type="button" class="mt-6 w-full rounded-2xl bg-gradient-to-r from-amber-500 to-red-600 px-5 py-4 text-base font-extrabold text-white shadow-lg shadow-red-950/40 transition hover:from-amber-400 hover:to-red-500 focus:outline-none focus:ring-4 focus:ring-amber-500/30 active:scale-[0.99] sm:text-lg">
            计算最终伤害
          </button>
        </section>

        <section class="rounded-3xl border border-amber-500/20 bg-slate-950/70 p-5 sm:p-6">
          <h2 class="mb-5 text-xl font-bold text-white">计算结果</h2>

          <div id="result" class="rounded-3xl border border-amber-400/30 bg-gradient-to-br from-amber-500/15 to-red-600/10 px-5 py-6 text-center">
            <p class="text-sm font-semibold uppercase tracking-[0.25em] text-amber-300">Final Damage</p>
            <p id="finalDamage" class="mt-3 text-5xl font-black text-white sm:text-6xl">100</p>
          </div>

          <div class="mt-6">
            <h3 class="mb-3 text-lg font-bold text-white">详细计算步骤</h3>
            <div id="steps" class="space-y-3 text-sm leading-6 text-slate-300"></div>
          </div>
        </section>
      </div>

      <footer class="border-t border-slate-800 bg-slate-950/60 px-6 py-6 text-sm leading-7 text-slate-400 sm:px-8 md:px-10">
        <p>
          说明：本计算器根据输入数值模拟《地牢之子》（Dungeonborne）中的一次伤害结算流程。当前属性加成采用简化规则“属性值 × 2”，后续可以根据更精确的职业、武器或技能数据继续调整。爆头会强制触发暴击，并在原暴击倍率基础上额外增加 0.5。
        </p>
      </footer>
    </section>
  </main>

  <script>
    const ATTRIBUTE_BONUS_MULTIPLIER = 2;

    const inputs = {
      weaponDamage: document.getElementById('weaponDamage'),
      attackType: document.getElementById('attackType'),
      attributeValue: document.getElementById('attributeValue'),
      skillScaling: document.getElementById('skillScaling'),
      killBonus: document.getElementById('killBonus'),
      damageBonus: document.getElementById('damageBonus'),
      isCritical: document.getElementById('isCritical'),
      criticalMultiplier: document.getElementById('criticalMultiplier'),
      enemyDefenseLevel: document.getElementById('enemyDefenseLevel'),
      attackLevel: document.getElementById('attackLevel'),
      bodyPart: document.getElementById('bodyPart')
    };

    const attributeLabel = document.getElementById('attributeLabel');
    const calculateButton = document.getElementById('calculateButton');
    const finalDamageElement = document.getElementById('finalDamage');
    const stepsElement = document.getElementById('steps');

    function getNumber(input, fallback = 0) {
      const value = Number(input.value);
      return Number.isFinite(value) ? value : fallback;
    }

    function clamp(value, min, max) {
      return Math.min(Math.max(value, min), max);
    }

    function floorDamage(value) {
      return Math.floor(Math.max(value, 0));
    }

    function formatPercentMultiplier(percent) {
      return (1 + percent / 100).toFixed(2);
    }

    function updateFieldStates() {
      const isHeadshot = inputs.bodyPart.value === 'headshot';
      const isCritical = inputs.isCritical.checked || isHeadshot;

      inputs.isCritical.checked = isCritical;
      inputs.isCritical.disabled = isHeadshot;
      inputs.criticalMultiplier.disabled = !isCritical;

      attributeLabel.textContent = inputs.attackType.value === 'physical' ? '力量值' : '智力/意志值';
    }

    function calculateDamage() {
      updateFieldStates();

      const weaponDamage = getNumber(inputs.weaponDamage);
      const attributeValue = getNumber(inputs.attributeValue);
      const skillScaling = getNumber(inputs.skillScaling);
      const killBonus = getNumber(inputs.killBonus);
      const damageBonus = getNumber(inputs.damageBonus);
      const baseCriticalMultiplier = getNumber(inputs.criticalMultiplier, 1.5);
      const enemyDefenseLevel = clamp(getNumber(inputs.enemyDefenseLevel), 0, 50);
      const attackLevel = clamp(getNumber(inputs.attackLevel), 0, 50);
      const isHeadshot = inputs.bodyPart.value === 'headshot';
      const isCritical = inputs.isCritical.checked || isHeadshot;
      const attributeBonus = attributeValue * ATTRIBUTE_BONUS_MULTIPLIER;
      const baseDamage = weaponDamage + attributeBonus;
      const skillDamage = baseDamage * (skillScaling / 100);
      const modifiedDamage = skillDamage * (1 + killBonus / 100) * (1 + damageBonus / 100);
      const finalCriticalMultiplier = isCritical ? baseCriticalMultiplier + (isHeadshot ? 0.5 : 0) : 1;
      const criticalDamage = modifiedDamage * finalCriticalMultiplier;
      const effectiveDefenseLevel = Math.max(enemyDefenseLevel - attackLevel, 0);
      const defenseReductionCoefficient = Math.max(0, 1 - effectiveDefenseLevel * 0.02);
      const finalDamage = criticalDamage * defenseReductionCoefficient;

      finalDamageElement.textContent = floorDamage(finalDamage);
      stepsElement.innerHTML = `
        <div class="rounded-2xl border border-slate-800 bg-slate-900/80 p-4">
          <span class="font-bold text-amber-200">1. 属性加成：</span>${attributeValue} × ${ATTRIBUTE_BONUS_MULTIPLIER} = ${floorDamage(attributeBonus)}
        </div>
        <div class="rounded-2xl border border-slate-800 bg-slate-900/80 p-4">
          <span class="font-bold text-amber-200">2. 基础伤害：</span>${weaponDamage} + ${floorDamage(attributeBonus)} = ${floorDamage(baseDamage)}
        </div>
        <div class="rounded-2xl border border-slate-800 bg-slate-900/80 p-4">
          <span class="font-bold text-amber-200">3. 技能成长伤害：</span>${floorDamage(baseDamage)} × (${skillScaling} / 100) = ${floorDamage(skillDamage)}
        </div>
        <div class="rounded-2xl border border-slate-800 bg-slate-900/80 p-4">
          <span class="font-bold text-amber-200">4. 乘法修饰后伤害：</span>${floorDamage(skillDamage)} × ${formatPercentMultiplier(killBonus)} × ${formatPercentMultiplier(damageBonus)} = ${floorDamage(modifiedDamage)}
        </div>
        <div class="rounded-2xl border border-slate-800 bg-slate-900/80 p-4">
          <span class="font-bold text-amber-200">5. 暴击后伤害：</span>${floorDamage(modifiedDamage)} × ${finalCriticalMultiplier.toFixed(2)}${isHeadshot ? '（爆头额外 +0.5）' : ''} = ${floorDamage(criticalDamage)}
        </div>
        <div class="rounded-2xl border border-slate-800 bg-slate-900/80 p-4">
          <span class="font-bold text-amber-200">6. 有效防御等级：</span>max(${enemyDefenseLevel} - ${attackLevel}, 0) = ${effectiveDefenseLevel}
        </div>
        <div class="rounded-2xl border border-slate-800 bg-slate-900/80 p-4">
          <span class="font-bold text-amber-200">7. 防御减免系数：</span>max(0, 1 - ${effectiveDefenseLevel} × 0.02) = ${defenseReductionCoefficient.toFixed(2)}
        </div>
        <div class="rounded-2xl border border-amber-500/30 bg-amber-500/10 p-4 text-amber-100">
          <span class="font-bold">8. 最终伤害：</span>${floorDamage(criticalDamage)} × ${defenseReductionCoefficient.toFixed(2)} = ${floorDamage(finalDamage)}
        </div>
      `;
    }

    calculateButton.addEventListener('click', calculateDamage);
    Object.values(inputs).forEach((input) => {
      input.addEventListener('input', updateFieldStates);
      input.addEventListener('change', updateFieldStates);
    });

    updateFieldStates();
    calculateDamage();
  </script>
</body>
</html>
